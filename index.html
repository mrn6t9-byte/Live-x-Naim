<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MN X NAIM LIVE 🔴</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{margin:0;background:#02090c;color:#fff;font-family:'Inter',sans-serif;}
.header{text-align:center;padding:22px;font-size:28px;font-weight:800;color:#ffdd00;text-shadow:0 0 20px #ffdd00;}
.nav-buttons{display:flex;justify-content:center;gap:10px;margin-bottom:10px;}
.nav-buttons button{padding:10px 20px;border:none;border-radius:12px;font-weight:800;cursor:pointer;background:#222;color:#00ffe7;}
.page{display:none;}
#livePage,#highlightPage{max-width:650px;margin:auto;padding:10px;}

/* ----------------- LIVE CARD ----------------- */
.match-card{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);border-radius:22px;padding:18px;margin:18px 0;box-shadow:0 0 25px rgba(0,0,0,.6);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.3s;}
.match-card:hover{transform:scale(1.03);}
.flag{width:56px;border-radius:6px;}
.match-info{text-align:center;flex:1;margin:0 10px;}
.match-title{font-size:22px;font-weight:800;color:#00ffe7;text-shadow:0 0 10px #00ffe7;}
.match-sub{font-size:14px;color:#ddd;margin-top:4px;}
.timer{font-size:18px;font-weight:700;margin-top:6px;}
.live-center{display:none;text-align:center;color:#ff2e2e;font-size:16px;font-weight:900;margin-top:5px;}

/* ----------------- PLAYER ----------------- */
#playerPage{display:none;position:fixed;inset:0;background:#000;z-index:999;padding:15px;overflow:auto;}
.back{font-size:18px;color:#00ffd5;font-weight:700;cursor:pointer;margin-bottom:10px;}
.player-title{text-align:center;font-size:22px;font-weight:800;color:#ffdd00;margin:10px 0;}
video{width:100%;height:280px;background:#000;border-radius:18px;}
.source-btn{width:100%;margin:8px 0;padding:12px;border:none;border-radius:14px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(90deg,#ff004c,#ffb300,#00e5ff,#ff004c);background-size:300% 300%;animation:rgb 6s linear infinite;}
@keyframes rgb{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ----------------- HIGHLIGHT CARD ----------------- */
.highlight-card{background:#111;border-radius:16px;padding:10px;margin:15px 0;box-shadow:0 0 15px rgba(0,255,231,0.4);transition:.3s;display:flex;flex-direction:column;align-items:center;}
.highlight-card:hover{transform:scale(1.02);}
.thumb{width:100%;border-radius:12px;aspect-ratio:16/9;object-fit:cover;margin-bottom:10px;}
.h-title{font-size:20px;font-weight:700;color:#00ffe7;text-align:center;margin-bottom:6px;}
.highlight-card button{padding:10px 20px;border:none;border-radius:10px;font-weight:700;cursor:pointer;background:#00ffe7;color:#111;margin-bottom:8px;width:80%;}
</style>
</head>
<body>

<div class="header">MN X NAIM LIVE 🔴</div>
<div class="nav-buttons">
  <button onclick="showPage('livePage')">Live Matches</button>
  <button onclick="showPage('highlightPage')">Highlights</button>
</div>

<!-- Live Page -->
<div id="livePage" class="page"></div>

<!-- Highlight Page -->
<div id="highlightPage" class="page"></div>

<!-- Player Modal -->
<div id="playerPage">
  <div class="back" onclick="goBack()">← Back</div>
  <div class="player-title" id="playerTitle"></div>
  <video id="video" controls playsinline></video>
  <div id="sources"></div>
</div>

<script>
let hls=null;
const livePage=document.getElementById("livePage");
const highlightPage=document.getElementById("highlightPage");
const playerTitle=document.getElementById("playerTitle");
const video=document.getElementById("video");
const sources=document.getElementById("sources");

// ---------------- LIVE MATCH DATA ----------------
const liveMatches=[
  {title:"BAN vs PAK ", sub:"1st ODI 2026 •02:15 PM", left:"https://flagcdn.com/w80/bd.png", right:"https://flagcdn.com/w80/pk.png", start:"2026-03-11T13:15:00", sources:[
    {name:"Fancode BD ",link:"http://spr1.packetcdn.me:2800/8ff02c8d28529a5dbdb5bf3f20c365044b64af718c39015e2e6e07950ea2b6a5/index.m3u8?token=a301bc71337614ac019a2b75d54817f1a49a969e7a8d0d3a490b84ee242f01ff75bf947bf8570b69ea3e8be6610a608bff859189e40b1aad930425cee0b241be8ce66d8efe-c88ddb44a9d77e117999551bd88b1c97"},
    {name:"PTV Sports  ",link:"http://spr1.packetcdn.me:2800/8ff02c8d28529a5dbdb5bf3f20c27a025b65b8618d260b5e336417f605b7a1a26048d2ee2e7eb4eba6/index.m3u8?token=fc5540a75489951d52e76ae667e6b729f10e1a1bfc022e5c4b1dec8dd3e6013f35e0179c01513ffeda219985fb349ba7139d69eb36abf1ab64c4c1d5d4b6fb1162f07fef5e-4ce83d05c9e540df5eb140c125379b65"},
    {name:"Willow",link:"http://ipl.packetcdn.me:8978/8ff02c8d28529a5dbdb5bf3f20c37a1c4668ac6e913f06523f0507ec18aaa1a07b53c5e027/index.m3u8?token=5638a6b38bb78b2a76d47eeb3fffff708d788925dffe1cd5a7809fe8d8e1bfb89c322d97d87bff7f2620caeabc5230c2a201a17dba1842c6883276b6c98b33654dfa8ca975-bfd6acd60c68d840e0659bf33aaf20ab"},
    {name:"T Sports ",link:"http://spr1.packetcdn.me:2800/8ff02c8d28529a5dbdb5bf3f20c27a025b65b8619f3e06532f6b1bf618a7b5a466/index.m3u8?token=44cd8442fbd7f593d3cf19bb414cc19988d51d3c5ae47a38d42d2a3cb5981bb16f0d7030299ccf8000693e57949d5c3b5466205603b005864e9d9e2b905c479976f5230170-09f5f7b7e23b93e71ecda1acc1ec5d89"}
  ]}
  // Add more matches as needed
];

// ---------------- HIGHLIGHT DATA ----------------
const highlights=[
  {type:"single", title:"Nidahas Trophy Final ", img:"https://i.imgur.com/8O916Jd.png", link:"https://shivam.dsrbotzz.workers.dev/watch/98267/Final+India+vs+Bangladesh+2018.mp4+-+Naimx?hash=AgADBy"}
  // Add more highlights as needed
];

// ---------------- PAGE FUNCTIONS ----------------
function showPage(page){
  livePage.style.display=page==="livePage"?"block":"none";
  highlightPage.style.display=page==="highlightPage"?"block":"none";
}

// ---------------- LIVE MATCH RENDER ----------------
function loadLive(){
  livePage.innerHTML="";
  liveMatches.forEach(m=>{
    const card=document.createElement("div");
    card.className="match-card";
    card.innerHTML=`
      <img class="flag" src="${m.left}">
      <div class="match-info">
        <div class="match-title">${m.title}</div>
        <div class="match-sub">${m.sub}</div>
        <div class="timer">00:00:00</div>
        <div class="live-center">LIVE</div>
      </div>
      <img class="flag" src="${m.right}">
    `;
    livePage.appendChild(card);

    const timerEl=card.querySelector(".timer");
    const liveEl=card.querySelector(".live-center");
    const start=new Date(m.start);
    setInterval(()=>{
      const diff=start-new Date();
      if(diff<=0){timerEl.innerText="LIVE"; liveEl.style.display="block";}
      else{
        const h=Math.floor(diff/36e5),mi=Math.floor((diff%36e5)/6e4),s=Math.floor((diff%6e4)/1000);
        timerEl.innerText=`${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      }
    },1000);

    card.onclick=()=>openMatch(m);
  });
}

// ---------------- OPEN MATCH ----------------
function openMatch(m){
  showPage(""); // hide both
  document.getElementById("playerPage").style.display="block";
  playerTitle.innerText=m.title+" • "+m.sub;
  sources.innerHTML="";

  if(hls){ hls.destroy(); hls=null; }
  video.src="";

  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(m.sources[0].link);
    hls.attachMedia(video);
  } else {
    video.src=m.sources[0].link; // Safari fallback
  }

  m.sources.forEach(s=>{
    const b=document.createElement("button");
    b.className="source-btn";
    b.innerText=s.name;
    b.onclick=()=>{
      if(hls){ hls.loadSource(s.link); }
      else{ video.src=s.link; video.play(); }
    };
    sources.appendChild(b);
  });
}

function goBack(){
  video.pause();
  document.getElementById("playerPage").style.display="none";
  showPage("livePage");
}

// ---------------- HIGHLIGHT RENDER ----------------
function loadHighlights(){
  highlightPage.innerHTML="";
  highlights.forEach(item=>{
    const card=document.createElement("div");
    card.className="highlight-card";
    card.innerHTML=`<img src="${item.img}" class="thumb"><div class="h-title">${item.title}</div>`;
    if(item.type==="single"){
      const btn=document.createElement("button");
      btn.innerText="Watch Highlight";
      btn.onclick=()=>window.open(item.link,"_blank");
      card.appendChild(btn);
    }
    highlightPage.appendChild(card);
  });
}

// ---------------- INIT ----------------
showPage("livePage");
loadLive();
loadHighlights();
</script>
</body>
</html>
